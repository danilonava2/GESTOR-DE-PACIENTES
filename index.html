<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinicaFlow - Gestión de Pacientes</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div class="logo">
        <h1>ClinicaFlow</h1>
        <p>Gestión de Pacientes</p>
      </div>
      <nav>
        <a href="#" class="menu-item active" data-section="registrar">📋 Registrar</a>
        <a href="#" class="menu-item" data-section="buscar">🔍 Buscar Pacientes</a>
        <a href="#" class="menu-item" data-section="pagos">💰 Gestión de Pagos</a>
      </nav>
    </div>

    <div class="main-content">
      <!-- REGISTRAR -->
      <div id="section-registrar" class="section active">
        <h2>📋 Nuevo Registro de Paciente</h2>
        <div class="card">
          <form id="formPaciente">
            <div class="form-grid">
              <div><label>Fecha</label><input type="date" id="fecha" required></div>
              <div><label>Nombre y Apellido</label><input type="text" id="nombre" required></div>
              <div><label>RUT</label><input type="text" id="rut" placeholder="12.345.678-9" maxlength="12" required></div>
              <div>
                <label>Previsión</label>
                <select id="prevision" required>
                  <option value="">Seleccionar Previsión</option>
                  <option value="FONASA">FONASA</option>
                  <option value="PARTICULAR">PARTICULAR</option>
                  <option value="EXONERADO">EXONERADO</option>
                </select>
              </div>
              <div><label>Monto ($)</label><input type="number" id="monto" readonly placeholder="Automático"></div>
            </div>
            <button type="submit" class="btn-primary">Registrar Paciente</button>
          </form>
        </div>
      </div>

      <!-- BUSCAR -->
      <div id="section-buscar" class="section">
        <h2>🔍 Buscar Pacientes</h2>
        <div class="card">
          <div class="search-bar">
            <input type="text" id="busqueda" placeholder="Ingrese RUT (ej: 12.345.678-9)">
            <button onclick="buscarPacientes()" class="btn-secondary">Buscar</button>
          </div>
          <div id="resultados"></div>
        </div>
      </div>

      <!-- GESTIÓN DE PAGOS -->
      <div id="section-pagos" class="section">
        <h2>💰 Gestión de Pagos</h2>
        <div class="card">
          <div class="date-range">
            <input type="date" id="fechaInicio" required>
            <input type="date" id="fechaFin" required>
            <button onclick="generarReporte()" class="btn-primary">Generar Reporte</button>
          </div>
          <div id="reporteContainer"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="successModal" class="modal">
    <div class="modal-content">
      <h2>✅ Registro Exitoso</h2>
      <p>El paciente ha sido registrado correctamente.</p>
      <button onclick="cerrarModal()" class="btn-primary">OK</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
